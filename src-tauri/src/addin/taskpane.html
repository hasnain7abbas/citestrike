<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CiteStrike</title>
    <link rel="stylesheet" href="http://localhost:27182/taskpane.css" />
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
</head>
<body>
    <div id="app">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <svg class="logo" viewBox="0 0 512 512" width="22" height="22">
                    <defs>
                        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#0F172A" />
                            <stop offset="100%" stop-color="#020617" />
                        </linearGradient>
                        <linearGradient id="strike" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#38BDF8" />
                            <stop offset="100%" stop-color="#24C8DB" />
                        </linearGradient>
                    </defs>
                    <rect width="512" height="512" rx="115" fill="url(#bg)" />
                    <path d="M 275 140 L 210 270 L 255 270 L 235 380 L 305 245 L 260 245 Z" fill="url(#strike)" />
                </svg>
                <span class="title">CiteStrike</span>
            </div>
            <select id="styleSelect">
                <option value="APA">APA</option>
                <option value="MLA">MLA</option>
                <option value="Chicago">Chicago</option>
                <option value="IEEE">IEEE</option>
                <option value="Harvard">Harvard</option>
                <option value="Vancouver">Vancouver</option>
                <option value="BibTeX">BibTeX</option>
            </select>
        </div>

        <!-- Search -->
        <div class="search-bar">
            <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" width="14" height="14">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
            <input type="text" id="searchInput" placeholder="Search your library..." autocomplete="off" />
        </div>

        <!-- Status -->
        <div id="status" class="status hidden"></div>

        <!-- Results -->
        <div id="results" class="results">
            <div class="empty-state">
                <p>Search your CiteStrike library</p>
                <p class="hint">Type to find papers by title, author, or DOI</p>
            </div>
        </div>

        <!-- Connection status -->
        <div class="footer">
            <span id="connectionStatus" class="connection-dot disconnected"></span>
            <span id="connectionLabel" class="connection-label">Connecting...</span>
        </div>
    </div>

    <script src="http://localhost:27182/taskpane.js"></script>
</body>
</html>
